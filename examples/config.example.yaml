# openstack-doctor 설정 예시.
# clouds.yaml 이 이미 있다면 그것만으로도 충분합니다.

cloud: my-openstack

# (선택) clouds.yaml 와 동일한 형식. 이 블록이 있으면 그대로 사용.
auth:
  auth_url: https://keystone.example.com:5000/v3
  username: admin
  password: "REPLACE_ME"
  project_name: admin
  user_domain_name: Default
  project_domain_name: Default
region_name: RegionOne
interface: public
identity_api_version: "3"

# 클러스터/시나리오 컨텍스트 (모두 선택)
cluster:
  name_prefix: my-k8s-          # Terraform/inventory 의 cluster_name prefix
  image_name: ubuntu-22.04      # kubespray 가 요구하는 Glance 이미지명
  api_port: 6443
  expected_nodes: 6
  expected_flavors:
    - k8s.master
    - k8s.worker

  # viola-cluster-api 배포 사전 점검용 추가 컨텍스트 (모두 선택)
  availability_zone: nova        # 인스턴스를 배포할 AZ 이름 (nova.py 에서 존재/가용 여부 확인)
  external_network: public       # Floating IP 및 라우터 게이트웨이용 external 네트워크 이름
  volume_type: ceph-ssd          # Pulumi 가 볼륨 생성에 사용하는 Cinder volume type 이름
  required_vcpus: 40             # 클러스터 전체 배포에 필요한 최소 여유 vCPU 수
  required_ram_mb: 81920         # 클러스터 전체 배포에 필요한 최소 여유 RAM (MB, 예: 80GB)
  min_free_fips: 3               # 최소 여유 Floating IP 수 (미달 시 ERROR)

# (선택) SSH 정보가 있을 때만 노드 진단을 수행합니다.
# 이 섹션이 없거나 비어 있으면 OpenStack API 만으로 진단합니다.
nodes:
  - name: ctrl-01
    role: controller            # controller | compute | k8s | custom
    ssh:
      host: 10.0.0.11
      user: ubuntu
      key_filename: ~/.ssh/id_rsa
  - name: cmp-01
    role: compute
    ssh:
      host: 10.0.0.21
      user: ubuntu
      key_filename: ~/.ssh/id_rsa
      bastion:
        host: 203.0.113.10
        user: ubuntu
        key_filename: ~/.ssh/id_rsa
  - name: k8s-master-1
    role: k8s
    ssh:
      host: 10.0.10.11
      user: ubuntu
      key_filename: ~/.ssh/id_rsa
